name: CD

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          IMAGE=${{ secrets.ACR_LOGIN_SERVER }}/wwtg-api
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest ./backend
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Azure Container Apps
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: azure/container-apps-deploy@v1
        with:
          resourceGroup: rg-weekend-buddy
          containerAppName: wwtg-api
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/wwtg-api:${{ github.sha }}
